name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and Build
        run: |
          cd hajj-website
          npm ci
          npm run build
      - name: Check output
        run: |
          ls hajj-website/out/data/ || echo "data folder not found"
          cat hajj-website/out/data/videos.json | head -c 200 || echo "videos.json not found"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HAJANDOMRA_23C77 }}
          channelId: live
          projectId: hajandomra-23c77